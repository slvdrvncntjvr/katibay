<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katibay | Community-Vouched Identity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f3efe2;
      --paper: #fffaf0;
      --ink: #1a1b1f;
      --accent: #0f766e;
      --accent-2: #f59e0b;
      --danger: #b42318;
      --muted: #5f6472;
      --line: #d9d4c3;
      --ok: #0a7d45;
      --radius: 18px;
      --shadow: 0 12px 40px rgba(31, 41, 55, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1100px 650px at -10% -20%, #ffd9a8 0%, rgba(255, 217, 168, 0) 70%),
        radial-gradient(900px 520px at 115% 10%, #9ee8dd 0%, rgba(158, 232, 221, 0) 65%),
        linear-gradient(180deg, #f7f2e6 0%, #f0e9d8 100%);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: min(900px, 100%);
      animation: rise 500ms ease-out;
    }

    .hero {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 6px);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
    }

    .hero-top {
      padding: 26px 24px 18px;
      border-bottom: 1px dashed var(--line);
      background: linear-gradient(125deg, rgba(15, 118, 110, 0.08), rgba(245, 158, 11, 0.12));
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Fraunces", serif;
      font-weight: 900;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1;
      letter-spacing: -0.015em;
    }

    .tagline {
      margin: 0;
      color: #2f3440;
      font-size: 1rem;
    }

    .hero-bottom {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 16px 24px 22px;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.85rem;
      background: #fff;
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .panel {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      animation: rise 500ms ease-out;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-family: "Fraunces", serif;
      font-size: 1.2rem;
      line-height: 1.1;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.87rem;
      color: #3d4350;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid #c9c3b2;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: "Space Grotesk", sans-serif;
      background: #fffef9;
      color: var(--ink);
    }

    .field input:focus {
      outline: 2px solid rgba(15, 118, 110, 0.4);
      border-color: var(--accent);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 14px;
      cursor: pointer;
      font-weight: 700;
      font-family: "Space Grotesk", sans-serif;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.04); }
    button:active { transform: translateY(0); }

    .primary { background: var(--accent); color: #fff; }
    .secondary { background: #e6efe9; color: #163f3b; }

    .wallet-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 6px;
    }

    .status {
      margin-top: 8px;
      font-size: 0.92rem;
      color: var(--muted);
      word-break: break-word;
    }

    .result {
      margin-top: 10px;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.9rem;
      border: 1px solid var(--line);
      background: #fffcf3;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .ok { color: var(--ok); }
    .err { color: var(--danger); }

    .full {
      grid-column: 1 / -1;
    }

    @keyframes rise {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (max-width: 820px) {
      .panel-grid { grid-template-columns: 1fr; }
      .hero-top, .hero-bottom { padding-left: 16px; padding-right: 16px; }
      .panel { padding: 14px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-top">
        <h1>Katibay</h1>
        <p class="tagline">Your community knows who you are. Now the blockchain does too.</p>
      </div>
      <div class="hero-bottom">
        <span class="pill">Soroban Testnet</span>
        <span class="pill">Freighter Wallet</span>
        <span class="pill">Community Vouching</span>
      </div>
    </section>

    <section class="panel-grid">
      <article class="panel full">
        <h2>Connection</h2>
        <div class="field">
          <label for="rpcUrl">Soroban RPC URL</label>
          <input id="rpcUrl" value="https://soroban-testnet.stellar.org" />
        </div>
        <div class="field">
          <label for="networkPassphrase">Network Passphrase</label>
          <input id="networkPassphrase" value="Test SDF Network ; September 2015" />
        </div>
        <div class="field">
          <label for="contractId">Katibay Contract ID</label>
          <input id="contractId" placeholder="CC..." />
        </div>

        <div class="wallet-row">
          <button id="connectBtn" class="primary" type="button">Connect Freighter</button>
          <button id="disconnectBtn" class="secondary" type="button">Clear Session</button>
          <button id="diagBtn" class="secondary" type="button">Run Diagnostics</button>
        </div>
        <div class="status" id="walletStatus">Wallet not connected.</div>
        <div id="diagResult" class="result">Diagnostics not run yet.</div>
      </article>

      <article class="panel">
        <h2>Vouch For Student</h2>
        <div class="field">
          <label for="vouchStudent">Student Address (G...)</label>
          <input id="vouchStudent" placeholder="G..." />
        </div>
        <div class="field">
          <label for="nameHash">Name Hash (32-byte hex, no 0x)</label>
          <input id="nameHash" maxlength="64" placeholder="64-char hex string" />
        </div>
        <button id="vouchBtn" class="primary" type="button">Submit Vouch</button>
        <div id="vouchResult" class="result">No transaction yet.</div>
      </article>

      <article class="panel">
        <h2>Check Verified</h2>
        <div class="field">
          <label for="verifyStudent">Student Address (G...)</label>
          <input id="verifyStudent" placeholder="G..." />
        </div>
        <button id="checkBtn" class="primary" type="button">Check Status</button>
        <div id="verifyResult" class="result">Awaiting query.</div>
      </article>

      <article class="panel full">
        <h2>Get Identity Record</h2>
        <div class="field">
          <label for="identityStudent">Student Address (G...)</label>
          <input id="identityStudent" placeholder="G..." />
        </div>
        <button id="identityBtn" class="primary" type="button">Fetch Identity</button>
        <div id="identityResult" class="result">No query yet.</div>
      </article>
    </section>
  </main>

  <script>
    const TESTNET_PASSPHRASE = "Test SDF Network ; September 2015";
    const $ = (id) => document.getElementById(id);

    const state = {
      walletAddress: null,
    };

    const walletStatus = $("walletStatus");
    const diagResult = $("diagResult");
    const vouchResult = $("vouchResult");
    const verifyResult = $("verifyResult");
    const identityResult = $("identityResult");

    let sdk = null;
    let freighterLib = null;

    async function loadSdk() {
      if (sdk) return sdk;

      const candidates = [
        "https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@14.6.1/+esm",
        "https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk/+esm",
      ];

      let lastError = null;
      for (const url of candidates) {
        try {
          if (url.includes("+esm")) {
            sdk = await import(url);
          } else {
            await new Promise((resolve, reject) => {
              const s = document.createElement("script");
              s.src = url;
              s.async = true;
              s.onload = resolve;
              s.onerror = reject;
              document.head.appendChild(s);
            });
            sdk = window.StellarSdk || null;
          }

          if (sdk) return sdk;
        } catch (err) {
          lastError = err;
        }
      }

      throw new Error(`Failed to load Stellar SDK from CDN: ${lastError || "unknown error"}`);
    }

    function getSdkFns(mod) {
      const candidates = [
        mod,
        mod?.default,
      ].filter(Boolean);

      let merged = {};
      for (const c of candidates) {
        merged = { ...merged, ...c };
      }

      return {
        Address: merged.Address,
        Contract: merged.Contract,
        Networks: merged.Networks,
        SorobanRpc: merged.SorobanRpc || merged.rpc || merged.Rpc,
        StrKey: merged.StrKey,
        TransactionBuilder: merged.TransactionBuilder,
        xdr: merged.xdr,
        scValToNative: merged.scValToNative,
        nativeToScVal: merged.nativeToScVal,
        keys: Object.keys(merged),
      };
    }

    async function loadFreighterLib() {
      if (freighterLib) return freighterLib;
      const candidates = [
        "https://cdn.jsdelivr.net/npm/@stellar/freighter-api@6.0.1/+esm",
        "https://esm.sh/@stellar/freighter-api@6.0.1",
        "https://cdn.jsdelivr.net/npm/@stellar/freighter-api/+esm",
        "https://esm.sh/@stellar/freighter-api",
      ];

      const errors = [];
      for (const url of candidates) {
        try {
          freighterLib = await import(url);
          if (freighterLib) return freighterLib;
        } catch (err) {
          errors.push(`${url} => ${err}`);
        }
      }

      throw new Error(`Failed to load Freighter web API library from all CDNs:\n${errors.join("\n")}`);
    }

    function getFreighterFns(mod) {
      const candidates = [
        mod,
        mod?.default,
        mod?.freighterApi,
        mod?.default?.freighterApi,
      ].filter(Boolean);

      let merged = {};
      for (const c of candidates) {
        merged = { ...merged, ...c };
      }

      return {
        requestAccess: merged.requestAccess,
        getAddress: merged.getAddress,
        signTransaction: merged.signTransaction,
        isConnected: merged.isConnected,
        getNetworkDetails: merged.getNetworkDetails,
        keys: Object.keys(merged),
      };
    }

    function setStatus(el, message, type = "") {
      el.textContent = message;
      el.classList.remove("ok", "err");
      if (type) el.classList.add(type);
    }

    function getConfig() {
      const rpc = $("rpcUrl").value.trim();
      const passphrase = $("networkPassphrase").value.trim() || TESTNET_PASSPHRASE;
      const contractId = $("contractId").value.trim();
      if (!rpc) throw new Error("RPC URL is required.");
      if (!contractId) throw new Error("Contract ID is required.");
      return { rpc, passphrase, contractId };
    }

    function hexToBytes32(hex) {
      if (!/^[0-9a-fA-F]{64}$/.test(hex)) {
        throw new Error("name_hash must be exactly 64 hex chars (32 bytes).");
      }
      const bytes = new Uint8Array(32);
      for (let i = 0; i < 32; i += 1) {
        bytes[i] = parseInt(hex.slice(i * 2, i * 2 + 2), 16);
      }
      return bytes;
    }

    function toAddressScVal(address, Address) {
      return new Address(address).toScVal();
    }

    function getFreighterApi() {
      const api = window.freighterApi;
      if (!api) {
        throw new Error("Freighter extension not detected. Install it, enable it, then refresh this page.");
      }
      return api;
    }

    async function freighterRequestAccess() {
      try {
        const lib = await loadFreighterLib();
        const fns = getFreighterFns(lib);
        if (fns.requestAccess) {
          const result = await fns.requestAccess();
          if (result?.error) throw new Error(result.error);
          return result?.address || null;
        }
      } catch (_) {
        // Fallback handled below.
      }

      const api = getFreighterApi();
      if (api.requestAccess) {
        const result = await api.requestAccess();
        if (result?.error) throw new Error(result.error);
        return result?.address || null;
      }
      return null;
    }

    async function freighterGetAddress() {
      try {
        const lib = await loadFreighterLib();
        const fns = getFreighterFns(lib);
        if (fns.getAddress) {
          const result = await fns.getAddress();
          if (result?.error) throw new Error(result.error);
          return result?.address || "";
        }
      } catch (_) {
        // Fallback handled below.
      }

      const api = getFreighterApi();
      const result = await api.getAddress();
      const address = typeof result === "string" ? result : result?.address;
      if ((typeof result === "object" && result?.error) || !address) {
        throw new Error(result?.error || "Could not read Freighter address.");
      }
      return address;
    }

    async function freighterSignTransaction(xdr, networkPassphrase) {
      try {
        const lib = await loadFreighterLib();
        const fns = getFreighterFns(lib);
        if (fns.signTransaction) {
          const result = await fns.signTransaction(xdr, { networkPassphrase });
          if (result?.error) throw new Error(result.error);
          return result?.signedTxXdr || result?.xdr || result;
        }
      } catch (_) {
        // Fallback handled below.
      }

      const api = getFreighterApi();
      const result = await api.signTransaction(xdr, { networkPassphrase });
      const signedXdr = result?.signedTxXdr || result?.xdr || result;
      if (!signedXdr || result?.error) {
        throw new Error(result?.error || "Transaction signing cancelled or failed.");
      }
      return signedXdr;
    }

    async function runDiagnostics() {
      const ua = navigator.userAgent || "";
      const isVsCodeHost = /vscode|code-server|electron/i.test(ua);
      const isLocalhost = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "::1";
      const freighterInjected = !!window.freighterApi;
      const likelyBrowser = /chrome|chromium|brave|firefox|edg/i.test(ua);

      const lines = [
        `URL: ${location.href}`,
        `Host OK (localhost): ${isLocalhost}`,
        `Likely normal browser: ${likelyBrowser}`,
        `Likely VS Code embedded webview/simple browser: ${isVsCodeHost}`,
        `window.freighterApi injected: ${freighterInjected}`,
      ];

      try {
        const lib = await loadFreighterLib();
        const fns = getFreighterFns(lib);
        const hasFns = !!(fns.requestAccess && fns.getAddress && fns.signTransaction);
        lines.push(`freighter-api library loaded: ${hasFns}`);
        lines.push(`freighter-api exported keys: ${fns.keys.slice(0, 20).join(", ") || "(none)"}`);

        if (fns.isConnected) {
          const connected = await fns.isConnected();
          lines.push(`freighter-api isConnected: ${connected?.isConnected === true}`);
          if (connected?.error) lines.push(`freighter-api isConnected error: ${connected.error}`);
        }

        if (fns.getNetworkDetails) {
          const net = await fns.getNetworkDetails();
          if (net?.error) {
            lines.push(`freighter-api network error: ${net.error}`);
          } else {
            lines.push(`Freighter network: ${net?.network || "unknown"}`);
            lines.push(`Freighter network passphrase: ${net?.networkPassphrase || "unknown"}`);
            lines.push(`Freighter Soroban RPC: ${net?.sorobanRpcUrl || "unknown"}`);
          }
        }
      } catch (e) {
        lines.push(`freighter-api library load failed: ${e?.message || e}`);
      }

      if (!freighterInjected) {
        lines.push("Fix: Open this app in Chrome/Brave/Firefox (not VS Code Simple Browser), then refresh.");
        lines.push("Fix: Ensure Freighter extension is installed, enabled, unlocked, and allowed on this site.");
        lines.push("Note: Newer Freighter integrations may still work via @stellar/freighter-api even if this global is missing.");
      }

      const looksUsable = lines.some((l) => l.includes("freighter-api library loaded: true"));
      setStatus(diagResult, lines.join("\n"), (freighterInjected || looksUsable) ? "ok" : "err");
    }

    async function getServerAndAccount() {
      const sdkMod = await loadSdk();
      const { SorobanRpc, keys } = getSdkFns(sdkMod);
      const { rpc } = getConfig();
      const ServerCtor = SorobanRpc?.Server;
      if (!ServerCtor) {
        throw new Error(`Soroban RPC Server not found in loaded Stellar SDK exports. Keys: ${keys.slice(0, 40).join(", ")}`);
      }
      const server = new ServerCtor(rpc, { allowHttp: rpc.startsWith("http://") });
      const account = await server.getAccount(state.walletAddress);
      return { server, account };
    }

    async function pollTx(server, hash) {
      for (let i = 0; i < 20; i += 1) {
        const tx = await server.getTransaction(hash);
        if (tx.status === "SUCCESS") return tx;
        if (tx.status === "FAILED") {
          throw new Error("Transaction failed on-chain.");
        }
        await new Promise((r) => setTimeout(r, 1200));
      }
      throw new Error("Timed out waiting for transaction confirmation.");
    }

    async function connectWallet() {
      await freighterRequestAccess();
      const address = await freighterGetAddress();
      if (!address) throw new Error("Could not read Freighter address.");

      state.walletAddress = address;
      setStatus(walletStatus, `Connected as ${state.walletAddress}`, "ok");
    }

    async function submitVouch() {
      if (!state.walletAddress) throw new Error("Connect Freighter first.");

      const student = $("vouchStudent").value.trim();
      const nameHashHex = $("nameHash").value.trim();
      const { passphrase, contractId } = getConfig();
      const sdkMod = await loadSdk();
      const {
        Address,
        Contract,
        SorobanRpc,
        StrKey,
        TransactionBuilder,
        xdr,
        nativeToScVal,
      } = getSdkFns(sdkMod);

      if (!StrKey.isValidEd25519PublicKey(student)) {
        throw new Error("Student address is not a valid Stellar G-address.");
      }

      const nameHashBytes = hexToBytes32(nameHashHex);
      const { server, account } = await getServerAndAccount();

      const op = new Contract(contractId).call(
        "vouch_for",
        toAddressScVal(state.walletAddress, Address),
        toAddressScVal(student, Address),
        xdr.ScVal.scvBytes(nameHashBytes)
      );

      const tx = new TransactionBuilder(account, {
        fee: "100000",
        networkPassphrase: passphrase,
      })
        .addOperation(op)
        .setTimeout(120)
        .build();

      const prepared = await server.prepareTransaction(tx);
      const signedXdr = await freighterSignTransaction(prepared.toXDR(), passphrase);

      const signedTx = TransactionBuilder.fromXDR(signedXdr, passphrase);
      const sent = await server.sendTransaction(signedTx);

      if (sent.status === "ERROR") {
        throw new Error(`RPC rejected tx: ${JSON.stringify(sent.errorResult || sent)}`);
      }

      const hash = sent.hash || signedTx.hash().toString("hex");
      const finalTx = await pollTx(server, hash);
      setStatus(vouchResult, `Vouch submitted. Tx hash: ${finalTx.hash}`, "ok");
    }

    async function checkVerified() {
      const student = $("verifyStudent").value.trim();
      const sdkMod = await loadSdk();
      const {
        Address,
        Contract,
        SorobanRpc,
        StrKey,
        TransactionBuilder,
        scValToNative,
        keys,
      } = getSdkFns(sdkMod);
      if (!StrKey.isValidEd25519PublicKey(student)) {
        throw new Error("Student address is not a valid Stellar G-address.");
      }

      const { rpc, passphrase, contractId } = getConfig();
      const ServerCtor = SorobanRpc?.Server;
      if (!ServerCtor) {
        throw new Error(`Soroban RPC Server not found in loaded Stellar SDK exports. Keys: ${keys.slice(0, 40).join(", ")}`);
      }
      const server = new ServerCtor(rpc, { allowHttp: rpc.startsWith("http://") });
      const source = state.walletAddress || student;
      const account = await server.getAccount(source);

      const op = new Contract(contractId).call("check_verified", toAddressScVal(student, Address));
      const tx = new TransactionBuilder(account, {
        fee: "100000",
        networkPassphrase: passphrase,
      })
        .addOperation(op)
        .setTimeout(60)
        .build();

      const sim = await server.simulateTransaction(tx);
      if (SorobanRpc.Api.isSimulationError(sim)) {
        throw new Error("Simulation error while checking verification state.");
      }

      const retval = sim.result?.retval;
      const verified = retval ? scValToNative(retval) : false;
      setStatus(verifyResult, `Verified: ${verified ? "true" : "false"}`, verified ? "ok" : "");
    }

    async function getIdentity() {
      const student = $("identityStudent").value.trim();
      const sdkMod = await loadSdk();
      const {
        Address,
        Contract,
        SorobanRpc,
        StrKey,
        TransactionBuilder,
        scValToNative,
        keys,
      } = getSdkFns(sdkMod);
      if (!StrKey.isValidEd25519PublicKey(student)) {
        throw new Error("Student address is not a valid Stellar G-address.");
      }

      const { rpc, passphrase, contractId } = getConfig();
      const ServerCtor = SorobanRpc?.Server;
      if (!ServerCtor) {
        throw new Error(`Soroban RPC Server not found in loaded Stellar SDK exports. Keys: ${keys.slice(0, 40).join(", ")}`);
      }
      const server = new ServerCtor(rpc, { allowHttp: rpc.startsWith("http://") });
      const source = state.walletAddress || student;
      const account = await server.getAccount(source);

      const op = new Contract(contractId).call("get_identity", toAddressScVal(student, Address));
      const tx = new TransactionBuilder(account, {
        fee: "100000",
        networkPassphrase: passphrase,
      })
        .addOperation(op)
        .setTimeout(60)
        .build();

      const sim = await server.simulateTransaction(tx);
      if (SorobanRpc.Api.isSimulationError(sim)) {
        throw new Error("Simulation error while reading identity record.");
      }

      const retval = sim.result?.retval;
      if (!retval) {
        setStatus(identityResult, "No identity record returned.", "");
        return;
      }

      const identity = scValToNative(retval);
      setStatus(identityResult, JSON.stringify(identity, null, 2), "ok");
    }

    $("connectBtn").addEventListener("click", async () => {
      setStatus(walletStatus, "Connecting to Freighter... If no popup appears, click the Freighter extension icon.");
      try {
        await connectWallet();
      } catch (err) {
        setStatus(walletStatus, err.message || String(err), "err");
      }
    });

    $("disconnectBtn").addEventListener("click", () => {
      state.walletAddress = null;
      setStatus(walletStatus, "Wallet session cleared.");
    });

    $("diagBtn").addEventListener("click", async () => {
      setStatus(diagResult, "Running diagnostics...");
      await runDiagnostics();
    });

    $("vouchBtn").addEventListener("click", async () => {
      setStatus(vouchResult, "Submitting vouch transaction...");
      try {
        await submitVouch();
      } catch (err) {
        setStatus(vouchResult, err.message || String(err), "err");
      }
    });

    $("checkBtn").addEventListener("click", async () => {
      setStatus(verifyResult, "Querying contract...", "");
      try {
        await checkVerified();
      } catch (err) {
        setStatus(verifyResult, err.message || String(err), "err");
      }
    });

    $("identityBtn").addEventListener("click", async () => {
      setStatus(identityResult, "Querying identity record...", "");
      try {
        await getIdentity();
      } catch (err) {
        setStatus(identityResult, err.message || String(err), "err");
      }
    });

    setStatus(diagResult, "App script loaded. Running initial diagnostics...");
    runDiagnostics();
  </script>
</body>
</html>
